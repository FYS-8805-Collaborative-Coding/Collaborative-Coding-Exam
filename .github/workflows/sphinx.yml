name: Docs

on:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install sphinx 2>/dev/null || true
      - name: Build docs
        run: sphinx-build -b html docs/ docs/_build/html 2>/dev/null || echo "TODO: set up Sphinx docs"
