name: Format

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: |
          ruff format --check . 2>/dev/null || echo "TODO: configure formatting"
      - name: Lint
        run: |
          ruff check . 2>/dev/null || echo "TODO: configure linting"
